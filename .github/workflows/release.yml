name: Release

on:
  push:
    tags:
      - 'v*'

# Only one release workflow at a time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Phase 1: Create a draft release so all build jobs can upload to
  # the same release ID.  This avoids the race condition where
  # multiple build jobs try to create a release concurrently.
  # ------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `BoltMD ${context.ref.replace('refs/tags/', '')}`,
              draft: true,
              prerelease: false,
            });
            core.setOutput('id', data.id);
            console.log(`Created draft release ${data.id}`);

  # ------------------------------------------------------------------
  # Phase 2: Build on each platform and upload artifacts to the draft
  # release created in phase 1.
  # ------------------------------------------------------------------
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test:run

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      # Windows portable zip: package the bare exe + WebView2Loader into
      # a zip so users can run BoltMD without installation.
      - name: Package Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $src = "src-tauri/target/release/BoltMD.exe"
          $zip = "BoltMD_${version}_x64_portable.zip"
          Compress-Archive -Path $src -DestinationPath $zip

      - name: Upload Windows portable zip
        if: matrix.platform == 'windows-latest'
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const version = require('./src-tauri/tauri.conf.json').version;
            const zipName = `BoltMD_${version}_x64_portable.zip`;
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              name: zipName,
              data: fs.readFileSync(zipName),
            });
